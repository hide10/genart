<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hide10 — generative art</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'SF Mono', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 14px;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 960px;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: rgba(255,255,255,0.25); }
    .card a {
      display: block;
      padding: 32px 28px;
      text-decoration: none;
      color: #fff;
    }
    .card .num {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.2em;
      margin-bottom: 12px;
    }
    .card .title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }
    .card .desc {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
    }
    .card .tag {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 3px 10px;
      border-radius: 99px;
      letter-spacing: 0.1em;
    }
    .card.wip a { pointer-events: none; }
    .card.wip .title { color: rgba(255,255,255,0.3); }
    .card.wip .tag { color: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <h1>hide10 / generative art</h1>
  <div class="grid">
    <div class="card">
      <a href="flowfield/">
        <div class="num">01</div>
        <div class="title">Flow Field</div>
        <div class="desc">Perlinノイズで定義した風の場に粒子を流す。マウスで乱流を起こせる。</div>
        <span class="tag">perlin noise · particles</span>
      </a>
    </div>
    <div class="card">
      <a href="fourier/">
        <div class="num">02</div>
        <div class="title">Fourier Drawing</div>
        <div class="desc">回転する円の重ね合わせが任意の形を描く。フーリエ変換の可視化。</div>
        <span class="tag">dft · epicycles · light trails</span>
      </a>
    </div>
    <div class="card">
      <a href="attractor/">
        <div class="num">03</div>
        <div class="title">Strange Attractor</div>
        <div class="desc">カオス方程式を何百万回も反復して浮かび上がる軌跡の密度。</div>
        <span class="tag">clifford · de jong · pixel density</span>
      </a>
    </div>
  </div>
</body>
</html>
